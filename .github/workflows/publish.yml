name: Publish to npm

# Publishes @plutopay/node on a version tag via npm OIDC trusted publishing —
# no long-lived NPM_TOKEN (2FA-safe).
#
# One-time setup (see README): npm requires a package to exist before trusted
# publishing can be configured, so the FIRST publish is done manually. After
# that, configure this repo + workflow as a trusted publisher for @plutopay/node
# on npmjs.com, and every `vX.Y.Z` tag auto-publishes here.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write # required for OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g npm@latest # trusted publishing needs npm >= 11.5.1
      - run: npm ci
      - run: npm test
      - run: npm publish --access public # provenance is automatic under trusted publishing
